<!doctype html>
<html lang="pt-BR" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A1F3B" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230A1F3B'/%3E%3Ctext x='50' y='66' text-anchor='middle' fill='white' font-family='Inter,sans-serif' font-weight='700' font-size='42'%3EV%3C/text%3E%3C/svg%3E" />
    <title>{{PROJECT_NAME}}</title>
    <script>
      // Anti-FOUC · aplica tema antes do React montar
      (function () {
        try {
          var stored = localStorage.getItem('via-theme');
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var theme = stored && stored !== 'system' ? stored : sys;
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

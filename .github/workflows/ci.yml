name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build · typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install deps
        run: bun install --frozen-lockfile

      - name: lint
        run: bun run lint

      - name: typecheck + build
        run: bun run build

      - name: build library
        run: bun run build:lib

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  visual:
    name: visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install deps
        run: bun install --frozen-lockfile

      - name: install playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: visual regression
        run: bun run test:visual

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

  a11y:
    name: a11y · WCAG 2.1 AA
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install deps
        run: bun install --frozen-lockfile

      - name: install playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: axe-core a11y suite
        run: bun run test:a11y

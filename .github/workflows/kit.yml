name: Emails · auto-sync

# Mantém os HTMLs renderizados (public/emails) em sincronia com os templates
# (emails/). SÓ os emails — eles são determinísticos (mesmos bytes em qualquer
# SO). O kit .zip NÃO é recommitado pelo CI: ele inclui o CSS compilado da lib
# (style.css), que o Vite/esbuild minifica de forma levemente diferente entre
# Linux e macOS (byte-diferente, funcionalmente igual) — isso causava commit
# espúrio. O kit é reconstruído localmente (bun run kit) quando o DS muda.
# Desacoplado do deploy (Vercel) — se falhar, o site continua no ar.

on:
  push:
    branches: [main]
    paths:
      - 'emails/**'
      - 'scripts/build-emails.mjs'

concurrency:
  group: emails-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    name: render emails + commita se mudou
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install deps
        run: bun install --frozen-lockfile
      - name: render emails
        run: bun run build:emails
      - name: commit emails (se mudaram)
        run: |
          git config user.name  "viver-de-ia-bot"
          git config user.email "bot@viverdeia.ai"
          git add public/emails
          if git diff --cached --quiet; then
            echo "Emails ja sincronizados - nada a commitar."
          else
            git commit -m "chore(emails): re-render (auto) [skip ci]"
            git push
            echo "Emails re-renderizados."
          fi

name: Kit · auto-regenerate

# Sempre que a fonte do DS muda (componentes, tokens, emails, prompt, logos,
# fontes), regenera a lib + os emails reais + o kit universal e commita de volta.
# Assim o kit que o time usa (e os HTMLs de email) nunca ficam defasados.
# Desacoplado do deploy do site (Vercel) — se falhar, o site continua no ar.

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/**'
      - 'src/styles/tokens.css'
      - 'emails/**'
      - 'docs/system-prompt.md'
      - 'docs/system-prompts/**'
      - 'scripts/build-kit.mjs'
      - 'scripts/build-emails.mjs'
      - 'scripts/build-tokens.mjs'
      - 'src/assets/fonts/**'
      - 'public/logos/**'

concurrency:
  group: kit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  regenerate:
    name: regenera lib + emails + kit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install deps
        run: bun install --frozen-lockfile

      - name: build lib + emails + kit + zip
        run: bun run kit

      - name: commit artefatos atualizados (se mudaram)
        run: |
          git config user.name  "viver-de-ia-bot"
          git config user.email "bot@viverdeia.ai"
          git add public/viver-de-ia-kit.zip public/emails
          if git diff --cached --quiet; then
            echo "Kit e emails ja estavam atualizados - nada a commitar."
          else
            git commit -m "chore(kit): regenera kit + emails (auto) [skip ci]"
            git push
            echo "Artefatos regenerados e commitados."
          fi
